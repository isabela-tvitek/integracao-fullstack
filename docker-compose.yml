version: "3.8"

services:
  back:
    build: ./back
    container_name: nest-back
    ports:
      - "3000:3000"
    volumes:
      - ./back:/app
      - /app/node_modules

  front:
    build: ./front
    container_name: next-front
    ports:
      - "3001:3000"
    volumes:
      - ./front:/app
      - /app/node_modules
    depends_on:
      - back
